<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>英語学習室</title>

<style>
body{
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
    max-width:1000px;
    margin:auto;
    padding:24px;
    background:#fafafa;
    color:#333;
    line-height:1.8;
}

header{
    text-align:center;
    margin:36px 0 48px;
}

h1{
    font-size:2.5rem;
    margin:0 0 14px;
    font-weight:700;
}

.subtitle{
    max-width:560px;
    margin:0 auto;
    color:#555;
}

.counter{
    margin-top:24px;
    font-size:1.4rem;
    font-weight:700;
}

.section{
    margin-top:46px;
}

.year-heading{
    margin:0 0 10px;
    font-size:1.35rem;
}

.cards{
    display:grid;
    grid-template-columns:repeat(auto-fill,minmax(82px,1fr));
    gap:8px;
}

.card{
    display:flex;
    min-height:66px;
    flex-direction:column;
    justify-content:center;
    border:1px solid #ddd;
    background:white;
    padding:6px 4px;
    border-radius:8px;
    color:inherit;
    text-decoration:none;
    transition:border-color .15s ease,box-shadow .15s ease,transform .15s ease;
}

.card:hover,
.card:focus-visible{
    border-color:#d49b3d;
    box-shadow:0 3px 9px rgba(128,88,20,.12);
    transform:translateY(-1px);
}

.card:focus-visible{
    outline:3px solid rgba(196,132,29,.35);
    outline-offset:2px;
}

.card-number{
    display:block;
    font-size:.95rem;
    font-weight:700;
    line-height:1.3;
}

.card-date{
    display:block;
    margin-top:2px;
    color:#666;
    font-size:.78rem;
    line-height:1.3;
}

footer{
    text-align:center;
    margin-top:64px;
    color:#888;
}

@media (max-width:760px){
    body{
        padding:18px;
    }

    h1{
        font-size:2rem;
    }

    .cards{
        grid-template-columns:repeat(auto-fill,minmax(82px,1fr));
        gap:8px;
    }
}
</style>
</head>

<body>

<header>
<h1>英語学習室</h1>

<p class="subtitle">
毎日の英語学習を記録しています。<br>
長文、単語、熟語、構文、原書。<br>
その日に学んだことを、少しずつ積み重ねていきます。
</p>

<div class="counter" id="counter"></div>
</header>

<main id="records"></main>

<footer>
英語学習室
</footer>

<script>
const records=[
    {
        year:"2026",
        number:"001",
        date:"2026-06-30",
        href:"2026/001/index.html"
    }
];

const counter=document.getElementById("counter");
const recordsRoot=document.getElementById("records");

counter.textContent=`学習記録：${records.length}日`;

const years=[...new Set(records.map(record=>record.year))].sort((a,b)=>b.localeCompare(a));

years.forEach(year=>{
    const yearRecords=records
        .filter(record=>record.year===year)
        .sort((a,b)=>a.number.localeCompare(b.number));

    const section=document.createElement("section");
    section.className="section";
    section.setAttribute("aria-labelledby",`year-${year}`);

    const heading=document.createElement("h2");
    heading.className="year-heading";
    heading.id=`year-${year}`;
    heading.textContent=year;
    section.appendChild(heading);

    const cards=document.createElement("div");
    cards.className="cards";

    yearRecords.forEach(record=>{
        const card=document.createElement("a");
        card.className="card";
        card.href=record.href;
        card.setAttribute("aria-label",`#${record.number} ${record.date}を開く`);

        const number=document.createElement("span");
        number.className="card-number";
        number.textContent=`#${record.number}`;

        const date=document.createElement("span");
        date.className="card-date";
        date.textContent=record.date;

        card.append(number,date);
        cards.appendChild(card);
    });

    section.appendChild(cards);
    recordsRoot.appendChild(section);
});
</script>

</body>
</html>
